<div class="auth-wrap d-flex align-items-center justify-content-center w-100">
    <div class="form-signin w-100 m-auto p-3">
        <form>
            <img class="mb-4 d-block mx-auto" src="/static/images/logo.png" alt="" width="171" height="70">
            <h1 class="h3 mb-3 text-center enter-title fs-1 fw-medium">Создайте аккаунт</h1>
            <div class="mb-2 text-center text-danger" id="error-singUp"></div>
            <div class="d-flex input-block">
                <div class="wrap-icon d-flex align-items-center justify-content-center p-2">
                    <i class="far fa-user text-secondary"></i>
                </div>
                <div class="form-floating w-100">
                    <input type="text" class="form-control logOrSign pt-4" id="signUpInputName" placeholder="Имя">
                    <label for="signUpInputName" class="d-flex align-items-center text-secondary">Имя</label>
                </div>
            </div>
            <div class="error mb-2 text-danger">Заполните имя</div>
            <div class="d-flex mt-2 input-block">
                <div class="wrap-icon d-flex align-items-center justify-content-center p-2">
                    <i class="far fa-user text-secondary"></i>
                </div>
                <div class="form-floating w-100">
                    <input type="text" class="form-control logOrSign pt-4" id="signUpInputLastName" placeholder="Фамилия">
                    <label for="signUpInputName" class="d-flex align-items-center text-secondary">Фамилия</label>
                </div>
            </div>
            <div class="error mb-2 text-danger">Заполните фамилию</div>
            <div class="d-flex mt-2 input-block">
                <div class="wrap-icon d-flex align-items-center justify-content-center p-2">
                    <i class="far fa-envelope-open text-secondary"></i>
                </div>
                <div class="form-floating w-100">
                    <input type="email" class="form-control logOrSign pt-4" id="signUpInputEmail"
                           placeholder="Электронная почта">
                    <label for="signUpInputEmail" class="d-flex align-items-center text-secondary">Электронная
                        почта</label>
                </div>
            </div>
            <div class="error mb-2 text-danger">Заполните email</div>
            <div class="d-flex mt-2 input-block">
                <div class="wrap-icon d-flex align-items-center justify-content-center p-2">
                    <i class="fas fa-lock text-secondary"></i>
                </div>
                <div class="form-floating w-100">
                    <input type="password" class="form-control logOrSign pt-4" id="signUpInputPassword"
                           placeholder="Пароль">
                    <label for="signUpInputPassword" class="d-flex align-items-center text-secondary">Пароль</label>
                </div>
            </div>
            <div class="error mb-2 text-danger">Заполните поле (не менее 6 символов)</div>
            <div class="d-flex mt-2 input-block">
                <div class="wrap-icon d-flex align-items-center justify-content-center p-2">
                    <i class="fas fa-lock text-secondary"></i>
                </div>
                <div class="form-floating w-100">
                    <input type="password" class="form-control logOrSign pt-4" id="signUpInputRepeatPassword"
                           placeholder="Подтверждение пароля">
                    <label for="signUpInputRepeatPassword" class="d-flex align-items-center text-secondary">Подтверждение
                        пароля</label>
                </div>
            </div>
            <div class="error mb-2 text-danger">Введите пароль еще раз, неверное значение</div>
            <button class="btn btn-primary w-100 mb-1 mt-3" type="button" id="singUpBtn">Войти</button>
            <p class="mt-1 mb-3 text-body-secondary">Уже есть аккаунт? <a href="/login">Войти в систему</a></p>
        </form>
    </div>
</div>
